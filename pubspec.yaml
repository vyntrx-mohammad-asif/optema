name: optima
description: "Optima — Next-Generation AI Health & Fitness App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI & Design
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

  # Local Storage
  hive: ^4.0.0
  hive_flutter: ^1.1.0

  # Utils
  intl: ^0.19.0

  # NOTE: নিচের dependencies পরে যোগ করবে (Firebase সেটআপ করার পর)
  # firebase_core: ^3.13.0
  # firebase_auth: ^5.5.2
  # cloud_firestore: ^5.6.6
  # firebase_database: ^11.3.5
  # firebase_messaging: ^15.2.5
  # firebase_storage: ^12.4.5
  # camera: ^0.11.1
  # sensors_plus: ^7.0.1
  # geolocator: ^13.0.2
  # pedometer_2: ^2.0.2
  # image_picker: ^1.1.2
  # permission_handler: ^11.4.0
  # flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # Fonts loaded dynamically via google_fonts package
